# Fusion Model Optimization V3 (Target: EER < 1.7%)
# Based on V2 results (EER 1.72% @ Epoch 25 -> 1.74% @ Epoch 30)
# Diagnosis: Overfitting (Train Acc increased, but EER degraded at end)
# Fix: Stronger Regularization (Weight Decay, Dropout) + Stronger Language Adversarial

# 1. Experiment Setup
exp_dir: exp/fusion_diff_lr_optimized_v3
num_epochs: 30
save_epoch_interval: 5
num_avg: 5                        # Average last 5 epochs (if converged)
seed: 999
gpus: [0]
enable_amp: true
log_batch_interval: 100

# 2. Dataset
train_data: data/tidyvoice_train/shard.list
train_label: data/tidyvoice_train/utt2spk
train_lang_label: data/tidyvoice_train/utt2lang

# 3. Dataloader
dataloader_args:
  batch_size: 48
  drop_last: true
  num_workers: 8
  pin_memory: true
  prefetch_factor: 4

# 4. Frontend & Augmentation
dataset_args:
  frontend: raw_fbank
  resample_rate: 16000
  sample_num_per_epoch: 0
  speed_perturb: false
  fbank_args: 
    num_mel_bins: 80
    frame_shift: 10
    frame_length: 25
  spec_aug: false                 # User constraint: Keep False
  spec_aug_args:
    num_t_mask: 3
    num_f_mask: 2
    max_t: 20
    max_f: 16
    prob: 0.6

# 5. Model Architecture
model: FusionSpeakerModel
model_args:
  w2v2_type: Wav2Vec2Speaker
  resnet_type: SimAM_ResNet34_ASP
  embed_dim: 256
  wav_scp_path: data/tidyvoice_train/wav.scp 
  
  num_languages: 40
  grl_lambda: 0.2                 # Increased: 0.1 -> 0.2 (Stronger language removal)

  resnet_args:
    model_init: exp/samresnet34_voxblink_ft_tidy/models_pretrained/avg_model.pt
    embed_dim: 256
    acoustic_dim: 80
    dropout: 0.1                  # Increased: 0.1 -> 0.2 (Fix Overfitting)
    in_planes: 64

  w2v2_args:
    embed_dim: 256
    pooling_func: ASTP
    feat_dim: 1024
    pretrained_path: exp/wav2vec2_xlsr_6epoch/wav2vec2-xls-r-300m
    freeze_feature_extractor: true
    freeze_all_layers: false
    model_init: null

# 6. Loss & Optimization
loss: CrossEntropyLoss
loss_args: {}

projection_args:
  project_type: arc_margin
  scale: 56.0
  easy_margin: false
  embed_dim: 256
  num_class: 3666
  do_lm: false

margin_scheduler: MarginScheduler
margin_update:
  initial_margin: 0.0
  final_margin: 0.35              # Keep 0.35, rely on dropout/wd to regularize
  increase_start_epoch: 2
  fix_start_epoch: 22
  increase_type: linear
  update_margin: true

optimizer: AdamW
optimizer_args:
  lr: 4.0e-5
  weight_decay: 0.1               # Increased: 0.05 -> 0.1 (Fix Overfitting)

scheduler: ExponentialDecrease
scheduler_args:
  initial_lr: 4.0e-5
  final_lr: 1.0e-6
  warm_up_epoch: 2
  warm_from_zero: true
  num_epochs: 30
  scale_ratio: 1.0

# 7. Differential Learning Rates
discriminative_lr:
  enabled: true
  lr_groups:
    resnet_backbone: 0.25
    resnet_head: 0.25
    w2v2_backbone: 0.25
    w2v2_head: 0.25
    fusion: 10.0
    projection: 10.0
    other: 1.0

noise_data: data/musan/lmdb
reverb_data: data/rirs/lmdb
