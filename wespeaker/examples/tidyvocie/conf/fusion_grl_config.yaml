# Fusion Model with GRL and Differential Learning Rates

# 1. 實驗目錄與時程
exp_dir: exp/fusion_grl_diff_lr_v1
num_epochs: 20
save_epoch_interval: 1
num_avg: 5
gpus: [0]
enable_amp: true

# 2. 數據集路徑
train_data: data/tidyvoice_train/shard.list
train_label: data/tidyvoice_train/utt2spk
# 語言標籤路徑 (由 generate_utt2lang.py 生成)
train_lang_label: data/tidyvoice_train/utt2lang

# 3. 資料讀取
dataloader_args:
  batch_size: 48
  drop_last: true
  num_workers: 8
  pin_memory: true
  prefetch_factor: 4

# 4. 前端處理
dataset_args:
  frontend: raw_fbank
  resample_rate: 16000
  sample_num_per_epoch: 0
  speed_perturb: false
  fbank_args: 
    num_mel_bins: 80
    frame_shift: 10
    frame_length: 25
  spec_aug: true
  spec_aug_args:
    num_t_mask: 1
    num_f_mask: 1
    max_t: 10
    max_f: 8
    prob: 0.5

# 5. 模型架構
model: FusionSpeakerModel
model_args:
  w2v2_type: Wav2Vec2Speaker
  resnet_type: SimAM_ResNet34_ASP
  embed_dim: 256                    # Bottleneck output dim (512 -> 256)
  wav_scp_path: data/tidyvoice_train/wav.scp 
  
  # 語言對抗訓練設置
  num_languages: 40                 # 根據 generate_utt2lang.py 掃描結果填入
  grl_lambda: 0.5                   # 梯度反轉強度，可調整 (0.1 ~ 1.0)

  w2v2_args:
    embed_dim: 256
    pooling_func: ASTP
    feat_dim: 1024
    pretrained_path: exp/wav2vec2_xlsr_6epoch/wav2vec2-xls-r-300m
    freeze_feature_extractor: true
    freeze_all_layers: false
    model_init: null

  resnet_args:
    embed_dim: 256
    in_planes: 64
    acoustic_dim: 80
    dropout: 0.1
    model_init: exp/samresnet34_voxblink_ft_tidy/models_pretrained/avg_model.pt

# 6. Loss & Projection
projection_args:
  project_type: arc_margin
  scale: 48.0                     # 稍微降低 Scale 適配 GRL 訓練
  easy_margin: false
loss: CrossEntropyLoss
loss_args: {}

# 7. 優化器與差異化學習率
optimizer: AdamW
optimizer_args:
  lr: 1.0e-3                      # Base LR (用於 Projection, Bottleneck, LanguageHead)
  weight_decay: 0.01

discriminative_lr:
  enabled: true
  lr_groups:
    w2v2: 2.0e-5                  # Wav2Vec2 使用極低學習率 (Fine-tuning)
    resnet: 1.0e-3                # ResNet 使用標準學習率
    language_head: 1.0e-3         # Language Head 使用標準學習率

# 8. 學習率排程
scheduler: ExponentialDecrease
scheduler_args:
  initial_lr: 1.0e-3
  final_lr: 1.0e-5
  warm_up_epoch: 2
  scale_ratio: 1

# 9. Margin 排程
margin_update:
  increase_start_epoch: 2
  fix_start_epoch: 10
  initial_margin: 0.1
  final_margin: 0.35
  update_margin: true
  epoch_iter: 0
  increase_type: linear
margin_scheduler: MarginScheduler

log_batch_interval: 100
