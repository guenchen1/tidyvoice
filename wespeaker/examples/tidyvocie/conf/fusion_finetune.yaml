# Fusion Model 8-Epoch Fine-tuning Configuration
# Optimization for TidyVoice small-dataset fine-tuning

# 1. 實驗目錄與時程 (Run 8: Tuned Scale 56 / Margin 0.35)
exp_dir: exp/fusion_finetune_tidyvoice_20ep_run8
num_epochs: 20                  # 維持 20 Epochs
save_epoch_interval: 1
num_avg: 5                      # 平均最後 5 個 checkpionts
gpus: [0]
enable_amp: true

# 2. 數據集路徑
train_data: data/tidyvoice_train/shard.list
train_label: data/tidyvoice_train/utt2spk

# 3. 資料讀取 (針對 RTX 5090 優化)
dataloader_args:
  batch_size: 48                # 改為 48 (根據目前 24 batch 佔用 14GB 推算，48 應該在 26-28GB 左右)
  drop_last: true
  num_workers: 8
  pin_memory: true
  prefetch_factor: 4

# 4. 前端處理 (SpecAug 關閉)
dataset_args:
  frontend: raw_fbank
  resample_rate: 16000
  sample_num_per_epoch: 0
  speed_perturb: false
  fbank_args: 
    num_mel_bins: 80
    frame_shift: 10
    frame_length: 25
  spec_aug: true
  spec_aug_args:
    num_t_mask: 1    # 只遮一個時間段
    num_f_mask: 1    # 只遮一個頻率段
    max_t: 10        # 長度約 0.1 秒 (輕微干擾)
    max_f: 8         # 頻率遮擋範圍適中
    prob: 0.5             # 依需求關閉

# 5. 模型架構
model: FusionSpeakerModel
model_args:
  w2v2_type: Wav2Vec2Speaker
  resnet_type: SimAM_ResNet34_ASP
  embed_dim: 512
  wav_scp_path: data/tidyvoice_train/wav.scp 

  w2v2_args:
    embed_dim: 256
    pooling_func: ASTP
    feat_dim: 1024
    pretrained_path: exp/wav2vec2_xlsr_6epoch/wav2vec2-xls-r-300m
    freeze_feature_extractor: true
    freeze_all_layers: false
    model_init: null

  resnet_args:
    embed_dim: 256
    in_planes: 64
    acoustic_dim: 80
    dropout: 0.1                  # [回歸 Run 1] 降回 0.1，Run 2 的 0.2 導致不穩
    model_init: exp/samresnet34_voxblink_ft_tidy/models_pretrained/avg_model.pt

# 6. Loss
projection_args:
  project_type: arc_margin
  scale: 56.0                     # [回歸 Run 1] 降回 32.0，64.0 太過激進導致震盪
  easy_margin: false
loss: CrossEntropyLoss
loss_args: {}

# 7. 優化器 (Run 8: Slightly Lower LR)
optimizer: AdamW
optimizer_args:
  lr: 4.0e-5                      # [調整] 降至 4.0e-5，配合高 Scale 56 進行更穩定收斂
  weight_decay: 0.01

# 8. 學習率排程 (Exponential)
scheduler: ExponentialDecrease
scheduler_args:
  initial_lr: 4.0e-5
  final_lr: 1.0e-6
  warm_up_epoch: 0                # [維持] 無需 Warmup
  scale_ratio: 1

# 9. Margin 排程 (Run 8: Sweet Spot Return)
# Run 7 顯示 Margin 0.4 太高，Run 5 最好。我們用 Scale 56 + Margin 0.35 挑戰極限
margin_update:
  increase_start_epoch: 2
  fix_start_epoch: 10
  initial_margin: 0.1
  final_margin: 0.35            # [回歸] 降回 0.35，這是已經驗證過的最佳幾何參數
  update_margin: true
  epoch_iter: 0
  increase_type: linear
margin_scheduler: MarginScheduler

log_batch_interval: 100
seed: 42
