# Fusion Model with Differential learning (Optimized Version)
# Optimization Strategy:
# 1. Higher LR for new layers (fusion/projection) to speed up convergence.
# 2. Slightly higher LR for backbones to allow better fine-tuning.
# 3. Softer Margin (0.3) to ease training difficulty.
# 4. Stronger SpecAug to improve generalization (lower EER).
# 5. More epochs (30).

# 1. Experiment Setup
exp_dir: exp/fusion_diff_lr_optimized_v1
num_epochs: 30
save_epoch_interval: 5
num_avg: 5
seed: 42
gpus: [0]
enable_amp: true
log_batch_interval: 100

# 2. Dataset
train_data: data/tidyvoice_train/shard.list
train_label: data/tidyvoice_train/utt2spk

# 3. Dataloader
dataloader_args:
  batch_size: 48
  drop_last: true
  num_workers: 8
  pin_memory: true
  prefetch_factor: 4

# 4. Frontend & Augmentation (Enhanced SpecAug)
dataset_args:
  frontend: raw_fbank
  resample_rate: 16000
  sample_num_per_epoch: 0
  speed_perturb: false
  fbank_args: 
    num_mel_bins: 80
    frame_shift: 10
    frame_length: 25
  spec_aug: false
  spec_aug_args:
    num_t_mask: 2        # Increased from 1
    num_f_mask: 2        # Increased from 1
    max_t: 20            # Increased from 10
    max_f: 16            # Increased from 8
    prob: 0.5

# 5. Model Architecture
model: FusionSpeakerModel
model_args:
  w2v2_type: Wav2Vec2Speaker
  resnet_type: SimAM_ResNet34_ASP
  embed_dim: 256
  wav_scp_path: data/tidyvoice_train/wav.scp 
  
  num_languages: 0
  grl_lambda: 0.0

  w2v2_args:
    embed_dim: 256
    pooling_func: ASTP
    feat_dim: 1024
    pretrained_path: exp/wav2vec2_xlsr_6epoch/wav2vec2-xls-r-300m
    freeze_feature_extractor: true
    freeze_all_layers: false
    model_init: null

  resnet_args:
    embed_dim: 256
    in_planes: 64
    acoustic_dim: 80
    dropout: 0.1
    model_init: exp/samresnet34_voxblink_ft_tidy/models_pretrained/avg_model.pt

# 6. Loss & Projection
projection_args:
  project_type: arc_margin
  scale: 56.0
  easy_margin: false
loss: CrossEntropyLoss
loss_args: {}

# 7. Optimizer & Differential LR
optimizer: AdamW
optimizer_args:
  lr: 4.0e-5
  weight_decay: 0.01

discriminative_lr:
  enabled: true
  lr_groups:
    w2v2_backbone: 0.1            # 0.1x  -> 4.0e-6 (More freedom than 0.01x)
    w2v2_head: 0.1
    resnet_backbone: 0.1
    resnet_head: 0.1
    fusion: 10.0                  # 10.0x -> 4.0e-4 (Fast learning for bottleneck)
    projection: 10.0              # 10.0x -> 4.0e-4
    other: 1.0

# 8. Learning Rate Scheduler
scheduler: ExponentialDecrease
scheduler_args:
  final_lr: 1.0e-6
  initial_lr: 4.0e-5
  num_epochs: 30
  scale_ratio: 1
  warm_up_epoch: 2                # Added warmup to stabilize large LR at start
  warm_from_zero: true            # Required for linear warmup from 0

# 9. Margin Scheduler (Modified final_margin)
margin_scheduler: MarginScheduler
margin_update:
  initial_margin: 0.0
  final_margin: 0.3               # Reduced from 0.35 to 0.3
  increase_start_epoch: 2
  fix_start_epoch: 15
  update_margin: true
  increase_type: linear
